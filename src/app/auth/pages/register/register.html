<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <h1>Create access request</h1>
      <p>Envoyez votre demande pour accéder aux dashboards BI de votre société.</p>
    </div>

    <form class="register-form" (ngSubmit)="register()">
      <div class="photo-section">
        <div class="photo-preview">
          @if (photoPreview) {
            <img [src]="photoPreview" alt="Profile preview" />
          } @else {
            <span class="material-symbols-outlined">person</span>
          }
        </div>

        <label class="photo-btn">
          Ajouter une photo
          <input type="file" accept="image/*" (change)="onPhotoSelected($event)" hidden />
        </label>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input
            type="text"
            name="firstName"
            [(ngModel)]="firstName"
            placeholder="Ex: Amine"
          />
        </div>

        <div class="form-group">
          <label>Nom</label>
          <input
            type="text"
            name="lastName"
            [(ngModel)]="lastName"
            placeholder="Ex: Akef"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="exemple@email.com"
        />
      </div>

      <div class="form-group">
        <label>Nom de la société</label>
        <input
          type="text"
          name="companyName"
          [(ngModel)]="companyName"
          placeholder="Ex: CamelSoft llc"
        />
      </div>

      @if (successMessage()) {
        <div class="success-message">
          {{ successMessage() }}
        </div>
      }

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) {
          Envoi en cours...
        } @else {
          Envoyer la demande
        }
      </button>

      <p class="login-link">
        Vous avez déjà un compte ?
        <a routerLink="/login">Se connecter</a>
      </p>
    </form>
  </div>
</div>
