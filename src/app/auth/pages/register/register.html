<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <h1>Create access request</h1>
      <p>Send your request to access your company's BI dashboards.</p>
    </div>

    <form class="register-form" (ngSubmit)="register()">
      <div class="photo-section">
        <div class="photo-preview">
          @if (photoPreview) {
            <img [src]="photoPreview" alt="Profile preview" />
          } @else {
            <span class="material-symbols-outlined">person</span>
          }
        </div>

        <label class="photo-btn">
          Add a photo
          <input type="file" accept="image/*" (change)="onPhotoSelected($event)" hidden />
        </label>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input
            type="text"
            name="firstName"
            [(ngModel)]="firstName"
            placeholder="Ex: Amine"
          />
        </div>

        <div class="form-group">
          <label>Last name</label>
          <input
            type="text"
            name="lastName"
            [(ngModel)]="lastName"
            placeholder="Ex: Akef"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="example@email.com"
        />
      </div>

      <div class="form-group">
        <label>Company name</label>
        <input
          type="text"
          name="companyName"
          [(ngModel)]="companyName"
          placeholder="Ex: CamelSoft LLC"
        />
      </div>

      @if (successMessage()) {
        <div class="success-message">
          {{ successMessage() }}
        </div>
      }

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) {
          Sending...
        } @else {
          Send request
        }
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </div>
</div>
